name: yidaan
description: "ידען — חידון שלבים"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  purchases_flutter: ^8.0.0
  shared_preferences: ^2.2.3   # ← חדש! לשמירת התקדמות שלבים ואנרגיה
  google_mobile_ads: ^5.1.0    # ← AdMob פרסומות
  audioplayers: ^6.1.0         # ← סאונד במובייל (iOS / Android)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
