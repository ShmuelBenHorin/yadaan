workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: yadaan

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: master.trivia

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Build iOS
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
