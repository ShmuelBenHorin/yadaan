workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - yidaan_keystore  # שם הקיסטור שתגדיר ב-CodeMagic
      vars:
        PACKAGE_NAME: "trivia.master"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=$(($(google-play get-latest-build-number \
              --package-name "$PACKAGE_NAME" \
              --tracks=alpha,beta,production) + 1))

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal  # שנה ל-alpha / beta / production לפי הצורך
        submit_as_draft: true
