workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: master.trivia

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Build iOS
        script: |
          cd ios && pod install && cd ..
          flutter build ipa --release \
            --dart-define=BUNDLE_ID=master.trivia

    artifacts:
      - build/ios/ipa/*.ipa
